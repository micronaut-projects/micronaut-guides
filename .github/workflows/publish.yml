name: Publish
on:
  push:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JDK_VERSION:  '25'
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/cache@v5.0.5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: 25
      - name: Build with Gradle
        run: ./gradlew build
        env:
          GRADLE_ENTERPRISE_ACCESS_KEY: ${{ secrets.GRADLE_ENTERPRISE_ACCESS_KEY }}
          GRADLE_ENTERPRISE_CACHE_USERNAME: ${{ secrets.GRADLE_ENTERPRISE_CACHE_USERNAME }}
          GRADLE_ENTERPRISE_CACHE_PASSWORD: ${{ secrets.GRADLE_ENTERPRISE_CACHE_PASSWORD }}
      - name: Calculate version of the guides
        id: guides_version
        run: |
          current_version=`cat version.txt`
          tmp_version=( ${current_version//./ } )
          version=`echo "${tmp_version[0]}.${tmp_version[1]}.x"`
          echo "guides_version=${version}" >> "$GITHUB_OUTPUT"
      - name: Publish to Github Pages
        uses: micronaut-projects/github-pages-deploy-action@6fc377d4236ae6f456ff7d1884f30b7547cd5248 # DEV-1143-pin-wolfi-base
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BRANCH: gh-pages
          FOLDER: build/dist
          VERSION: ${{ steps.guides_version.outputs.guides_version }}
